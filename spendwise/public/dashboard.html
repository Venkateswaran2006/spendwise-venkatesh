<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise | Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            padding: 2rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-card h4 {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .form-section {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 3rem;
        }

        .form-section h3 {
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            flex: 1;
            min-width: 150px;
        }

        .table-section {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-delete {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #ff4444;
            color: white;
        }
    </style>
</head>

<body>
    <div class="bg-animations">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo-container">
            <a href="index.html"
                style="text-decoration: none; color: white; display: flex; align-items: center; gap: 10px;">
                <img src="assets/logo.png" alt="SpendWise Logo">
                <span>SpendWise</span>
            </a>
        </div>
        <ul class="nav-links" style="display: flex; gap: 2rem; list-style: none;">
            <li><a href="index.html">Home</a></li>
            <li><a href="#add-transaction">Add Transaction</a></li>
            <li><a href="#history">History</a></li>
        </ul>
        <div class="user-info">
            <span id="username-display" style="margin-right: 1.5rem; font-weight: 500;"></span>
            <button onclick="logout()" class="btn-buy" style="cursor: pointer;">Logout</button>
        </div>

    </nav>

    <main class="dashboard-container">

        <section class="form-section">
            <h3 id="add-transaction">Add Transaction</h3>
            <div class="input-group">
                <input type="text" id="title" placeholder="Description (e.g. Starbucks)">
                <input type="number" id="amount" placeholder="Amount (e.g. 5.40)">
                <input type="date" id="date">
                <button onclick="addTransaction()" class="btn-primary" style="padding: 0.8rem 2rem;">Add
                    Transaction</button>
            </div>
        </section>

        <section class="table-section">
            <h3 id="history">Transaction History</h3>
            <table id="table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Transactions will be rendered here -->
                </tbody>
            </table>
        </section>

    </main>

    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/transactions.js"></script>
</body>

</html>
