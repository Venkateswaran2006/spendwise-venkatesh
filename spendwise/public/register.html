<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise | Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="bg-animations">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo-container">
            <a href="index.html"
                style="text-decoration: none; color: white; display: flex; align-items: center; gap: 10px;">
                <img src="assets/logo.png" alt="SpendWise Logo">
                <span>SpendWise</span>
            </a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="card fade-in-up">
            <a href="index.html" class="back-link"
                style="display: block; text-align: left; margin-bottom: 1rem; color: var(--text-muted); text-decoration: none;">←
                Back to Home</a>
            <h2>Create Account</h2>
            <p id="error"></p>
            <input id="name" type="text" placeholder="Full Name">
            <input id="email" type="email" placeholder="Email Address">
            <input id="password" type="password" placeholder="Password">
            <button onclick="register()" class="btn-primary">Start Trackings</button>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
