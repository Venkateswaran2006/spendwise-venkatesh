<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise | Smart Money. Smarter You.</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="bg-animations">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo-container">
            <img src="assets/logo.png" alt="SpendWise Logo">
            <span>SpendWise</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">Customers</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">How it works</a></li>
            <li><a href="#">Pricing</a></li>

        </p>

        <div class="btn-group">
            <a href="register.html" class="btn-primary">Start today - It's free</a>

        </div>

        <div class="preview-container">
            <img src="assets/dashboard-preview.png" alt="SpendWise Dashboard Preview" class="dashboard-img">
        </div>

    <script>
        window.onload = function () {
            const session = localStorage.getItem("session");
            if (session) {
                const navBtn = document.getElementById("nav-btn");
                navBtn.href = "dashboard.html";
                navBtn.innerText = "Dashboard";
